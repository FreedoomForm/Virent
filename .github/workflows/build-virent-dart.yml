name: Build Virent Dart (APK + Windows + Docker backend)

on:
  push:
    tags: ['v*']
    branches: [main]
    paths: ['virent-dart/**']
  workflow_dispatch:

jobs:
  # ============ Android APK ============
  build-apk:
    name: Build APK (Flutter)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: virent-dart/mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.2', cache: true }
      - run: flutter pub get
      - run: echo 'API_URL=http://10.0.2.2:8443' > .env
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk virent-android.apk
      - uses: actions/upload-artifact@v4
        with: { name: virent-dart-apk, path: virent-dart/mobile/virent-android.apk, retention-days: 90 }
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with: { files: virent-dart/mobile/virent-android.apk }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

  # ============ Windows .exe (server + UI) ============
  build-windows:
    name: Build Windows .exe (Flutter + Embedded Server)
    runs-on: windows-2022
    defaults: { run: { working-directory: virent-dart/mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.2', cache: true }
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: echo 'API_URL=http://localhost:8443' > .env
      - run: flutter build windows --release
      - shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath virent-windows.zip
          Write-Host "Size: $([math]::Round((Get-Item virent-windows.zip).Length / 1MB, 2)) MB"
      - uses: actions/upload-artifact@v4
        with: { name: virent-dart-windows, path: virent-dart/mobile/virent-windows.zip, retention-days: 90 }
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with: { files: virent-dart/mobile/virent-windows.zip }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

  # ============ Docker backend (for cloud VPS deployment) ============
  build-docker:
    name: Build & Push Docker Image (Cloud Backend)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: virent-dart/backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ secrets.GITHUB_TOKEN }}'
      - uses: docker/build-push-action@v5
        with:
          context: virent-dart/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/virent-backend:latest
            ghcr.io/${{ github.repository }}/virent-backend:${{ github.sha }}
      - name: Print deployment instructions
        run: |
          echo "## Cloud Backend Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker image pushed to:" >> $GITHUB_STEP_SUMMARY
          echo "  ghcr.io/${{ github.repository }}/virent-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy on any VPS:" >> $GITHUB_STEP_SUMMARY
          echo '  ```bash' >> $GITHUB_STEP_SUMMARY
          echo "  docker pull ghcr.io/${{ github.repository }}/virent-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo '  docker run -p 8443:8443 -d ghcr.io/${{ github.repository }}/virent-backend:latest' >> $GITHUB_STEP_SUMMARY
          echo '  ```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Mobile apps connect to: http://<VPS_IP>:8443" >> $GITHUB_STEP_SUMMARY
