name: Build BarqScoot Windows .exe (Flutter)

on:
  workflow_dispatch:
  schedule:
    # Run every Monday at 09:00 UTC to track upstream changes
    - cron: '0 9 * * 1'

jobs:
  build:
    name: Build BarqScoot Windows .exe
    runs-on: windows-2022

    steps:
      - name: Checkout BarqScoot source
        uses: actions/checkout@v4
        with:
          repository: RishiAhuja/BarqScoot
          ref: master
          path: barqscoot

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Enable Flutter desktop support
        run: flutter config --enable-windows-desktop
        working-directory: barqscoot

      - name: Display Flutter version & devices
        run: flutter doctor -v
        working-directory: barqscoot

      - name: Download dependencies
        run: flutter pub get
        working-directory: barqscoot

      - name: Generate code (Riverpod + Injectable + Hive)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: barqscoot

      - name: Create placeholder .env
        shell: pwsh
        working-directory: barqscoot
        run: |
          if (-not (Test-Path .env)) {
            if (Test-Path .env.example) {
              Copy-Item .env.example .env
            } else {
              "API_BASE_URL=https://api.example.com" | Out-File -FilePath .env
            }
          }
          Get-Content .env

      - name: Build Windows .exe
        run: flutter build windows --release
        working-directory: barqscoot

      - name: Find built .exe
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path barqscoot/build/windows/x64/runner/Release -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Host "Found: $($exe.FullName)"
            Write-Host "Size: $([math]::Round($exe.Length / 1MB, 2)) MB"
            # Copy entire Release folder (contains DLLs + data)
            $staging = "barqscoot-windows"
            New-Item -ItemType Directory -Path $staging -Force
            Copy-Item -Path "barqscoot/build/windows/x64/runner/Release/*" -Destination $staging -Recurse
            # List contents
            Get-ChildItem $staging -Recurse | Format-Table Name, Length
            "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            "exe_size=$($exe.Length)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "BarqScoot.exe not found"
          }

      - name: Zip staging folder
        if: steps.find_exe.outputs.exe_path
        shell: pwsh
        run: |
          Compress-Archive -Path barqscoot-windows -DestinationPath barqscoot-windows.zip
          $sizeMb = [math]::Round((Get-Item barqscoot-windows.zip).Length / 1MB, 2)
          Write-Host "Zip size: $sizeMb MB"

      - name: Upload .zip as artifact
        if: steps.find_exe.outputs.exe_path
        uses: actions/upload-artifact@v4
        with:
          name: barqscoot-windows-exe
          path: barqscoot-windows.zip
          retention-days: 30

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          "## BarqScoot Windows Build Result" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          if ("${{ steps.find_exe.outputs.exe_path }}") {
            $sizeMb = [math]::Round([int64]"${{ steps.find_exe.outputs.exe_size }}" / 1MB, 2)
            "Status: SUCCESS" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            ".exe size: $sizeMb MB" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "Framework: Flutter 3.27 (Dart)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "Source: github.com/RishiAhuja/BarqScoot" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            "Status: FAILED — check workflow logs" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }
