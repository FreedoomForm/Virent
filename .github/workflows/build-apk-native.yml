name: Build Android APK (DEPRECATED - use build-virent-dart.yml)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17 (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate native android/ folder
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK with Gradle
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find built APK
        id: find_apk
        run: |
          find android/app/build/outputs -name "*.apk" -type f 2>/dev/null
          APK_PATH=$(find android/app/build/outputs -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK to virent-android.apk
        if: steps.find_apk.outputs.apk_path
        run: cp "${{ steps.find_apk.outputs.apk_path }}" virent-android.apk

      - name: Upload APK as artifact
        if: steps.find_apk.outputs.apk_path
        uses: actions/upload-artifact@v4
        with:
          name: virent-android-apk
          path: mobile/virent-android.apk
          retention-days: 90

      - name: Upload APK to GitHub Release (on tags)
        if: startsWith(github.ref, 'refs/tags/v') && steps.find_apk.outputs.apk_path
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/virent-android.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## APK Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f virent-android.apk ]; then
            echo "Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "Size: $(du -h virent-android.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "Framework: React Native 0.72.10 / Expo SDK 49" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
