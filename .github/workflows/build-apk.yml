# DEPRECATED — use build-apk-native.yml instead
# This file is kept for backwards compatibility. The native Gradle build
# in build-apk-native.yml is the recommended way to build the APK because:
#   - No Expo account or EXPO_TOKEN secret required
#   - Uses standard Gradle + Android SDK
#   - APK is uploaded as a GitHub Actions artifact (90 day retention)
#   - On tag pushes, APK is also attached to the GitHub Release
#
# To trigger a build manually:
#   GitHub → Actions → "Build Android APK (Native Gradle, no Expo)" → Run workflow
#
# To trigger via tag:
#   git tag v1.1.0
#   git push origin v1.1.0
