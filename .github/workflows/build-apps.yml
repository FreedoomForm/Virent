name: Build Virent

on:
  push:
    branches: [main]
    paths: ['virent-dart/**', '.github/workflows/build-apps.yml']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: virent-dart/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true
      - run: flutter pub get
      - run: flutter doctor -v
      - run: yes | flutter doctor --android-licenses || true
      - run: |
          rm -rf android
          rm -rf android
          flutter create --platforms=android --project-name virent_mobile .
          # Apply custom Android files (SMS gateway, permissions)
          cp -r android_custom/* android/
      - run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: virent-android-apk
          path: virent-dart/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    name: VirentSetup
    runs-on: windows-latest
    defaults:
      run:
        working-directory: virent-dart/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true
      - run: flutter pub get
      - run: flutter doctor -v
      - run: flutter config --enable-windows-desktop
      - name: Download ngrok
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets\bin
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive -Path ngrok.zip -DestinationPath assets\bin -Force
          Remove-Item ngrok.zip
      - name: Add Windows platform files
        shell: pwsh
        run: |
          if (-not (Test-Path windows)) {
            flutter create --platforms=windows --project-name virent_mobile .
          }
      - run: flutter build windows --release --no-tree-shake-icons
      - name: Compile VirentSetup.exe
        shell: pwsh
        run: |
          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if (-not $iscc) { choco install innosetup -y --no-progress }
          iscc installer\virent.iss
      - uses: actions/upload-artifact@v4
        with:
          name: VirentSetup
          path: virent-dart/mobile/installer/Output/VirentSetup.exe
          retention-days: 30

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-windows]
    steps:
      - uses: actions/download-artifact@v4
      - run: ls -R
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            virent-android-apk/app-release.apk
            VirentSetup/VirentSetup.exe
          generate_release_notes: true
