name: Build BarqScoot APK (for comparison)

on:
  workflow_dispatch:
  schedule:
    # Run every Monday at 09:00 UTC to track upstream changes
    - cron: '0 9 * * 1'

jobs:
  build:
    name: Build BarqScoot APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout BarqScoot source
        uses: actions/checkout@v4
        with:
          repository: RishiAhuja/BarqScoot
          ref: master
          path: barqscoot

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Display Flutter version
        run: flutter --version
        working-directory: barqscoot

      - name: Download dependencies
        run: flutter pub get
        working-directory: barqscoot

      - name: Generate code (Riverpod + Injectable + Hive)
        # BarqScoot uses build_runner to generate Riverpod providers, injectable
        # service locator, and Hive adapters. Must run before build.
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: barqscoot

      - name: Create placeholder .env
        # BarqScoot's pubspec.yaml lists .env as an asset, so the file must exist
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || \
              echo 'API_BASE_URL=https://api.example.com' > .env
          fi
          cat .env
        working-directory: barqscoot

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        working-directory: barqscoot

      - name: Find built APK
        id: find_apk
        run: |
          find barqscoot/build/app/outputs/flutter-apk -name "*.apk" -type f
          APK_PATH=$(find barqscoot/build/app/outputs/flutter-apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Rename to barqscoot.apk
        run: cp "${{ steps.find_apk.outputs.apk_path }}" barqscoot.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: barqscoot-apk
          path: barqscoot.apk
          retention-days: 30

      - name: Print summary
        run: |
          echo "## BarqScoot APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Size: $(du -h barqscoot.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "Source: github.com/RishiAhuja/BarqScoot" >> $GITHUB_STEP_SUMMARY
          echo "Flutter version: $(flutter --version | head -1)" >> $GITHUB_STEP_SUMMARY
