# Run all backend tests on push/PR
#
# Per constitution §21: testing strategy — automated in CI
# Per constitution §28 law 50: backup/restore — part of backend-system
# Per constitution §27: module DoD — has tests

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DBURI: mongodb://localhost:27017
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      COOKIE_KEY: test-cookie-key
      API_TOKEN: '["test-key-admin","test-key-mobile","test-key-web"]'
      REACT_APP_ADMIN_API_KEY: test-key-admin
      REACT_APP_USER_MOBILE_API_KEY: test-key-mobile
      REACT_APP_USER_WEBB_API_KEY: test-key-web
      NODE_ENV: test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: 🗄️ Wait for MongoDB
        run: |
          echo "Waiting for MongoDB..."
          for i in {1..30}; do
            if mongosh --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1; then
              echo "MongoDB is ready"
              break
            fi
            sleep 1
          done

      - name: 🧪 Run all tests
        run: bash scripts/run-all-tests.sh

      - name: 📊 Publish test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests run on every push and PR." >> $GITHUB_STEP_SUMMARY
          echo "If this fails, check the test output above." >> $GITHUB_STEP_SUMMARY
