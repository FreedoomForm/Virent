accessPattern: otp_codes.createAndSend
owner: modules/auth
type: write

priority: D0   # auth-critical

params:
  phone: text
  purpose: enum(login, password_reset, phone_verify)

insert:
  - id = gen_random_uuid()
  - phone
  - purpose
  - code_hash = hash(generated_code)   # never store plain code
  - used = false
  - attempts = 0
  - created_at = now()
  - expires_at = now() + interval '10 minutes'

# Before insert, invalidate previous unused codes for same phone+purpose
pre_update:
  - UPDATE otp_codes SET used = true, invalidated_at = now()
    WHERE phone = :phone AND purpose = :purpose AND used = false

# Rate limit check before insert
pre_check:
  - SELECT count(*) FROM otp_codes
    WHERE phone = :phone AND created_at > now() - interval '1 minute'
  - if count > 0: REJECT with RATE_LIMIT_EXCEEDED

budget:
  p95Ms: 50
  maxRowsScanned: 10   # rate limit check

indexes:
  - name: idx_otp_phone_purpose_active
    columns: [phone, purpose, used, expires_at]
    partial: WHERE used = false
  - name: idx_otp_expires
    columns: [expires_at]
    type: TTL   # auto-expire after expires_at

notes:
  - Per constitution §19: rate limiting on auth endpoints is mandatory
  - Code is hashed at rest, never stored plain
  - TTL index auto-deletes expired codes
  - Max 5 verification attempts per code, then blocked
  - In dev mode, code is logged to console (SMS_PROVIDER=console)
