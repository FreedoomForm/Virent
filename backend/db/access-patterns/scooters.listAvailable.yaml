accessPattern: scooters.listAvailable
owner: modules/scooters
endpoint: GET /api/v1/discovery/available
view: GET /api/v1/views/dashboard (B1 section "fleet")

priority: D1   # frequent — user discovery screen

params:
  city_id: uuid (optional, filters by city)
  limit:
    default: 50
    max: 200

select:
  - id
  - name
  - model
  - battery
  - coordinates
  - status

filters:
  - status = 'available'
  - battery >= 15
  - owner_city_id = :city_id (optional)

sort:
  - battery DESC   # higher battery first

index:
  name: idx_scooters_status_battery
  columns:
    - status
    - battery
  partial: WHERE deleted_at IS NULL

budget:
  p95Ms: 50
  maxRowsReturned: 200
  maxRowsScanned: 1000
  maxPayloadKb: 60
  cacheTtlSec: 10

notes:
  - Called when user opens discovery screen
  - Short cache (10s) — availability changes often
  - Filter `battery >= 15` ensures user can actually ride
  - For huge fleets, consider precomputed "available_scooters" read model
