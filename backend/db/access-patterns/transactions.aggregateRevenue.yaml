accessPattern: transactions.aggregateRevenue
owner: modules/transactions
view: GET /api/v1/views/dashboard (B1 section "revenue")
endpoint: GET /api/v1/stats/revenue

priority: D2    # admin analytics, not on critical path

params:
  from: timestamptz (optional, default 30 days ago)
  to: timestamptz (optional, default now)
  granularity: enum(hour, day, week, month) (default day)

select:
  - sum(amount_cents) WHERE amount_cents > 0 AS revenue
  - sum(abs(amount_cents)) WHERE amount_cents < 0 AS spend
  - count(*) AS count
  - GROUP BY time bucket

filters:
  - status = 'completed'
  - created_at BETWEEN :from AND :to

sort:
  - time_bucket ASC

index:
  name: idx_txn_status_created
  columns:
    - status
    - created_at

budget:
  p95Ms: 300     # analytics can be slower
  maxRowsReturned: 365    # max 365 buckets (1 year of days)
  maxRowsScanned: 100000   # aggregation over historical data
  maxPayloadKb: 50
  cacheTtlSec: 300    # 5 minute cache — revenue data doesn't change minute-to-minute

notes:
  - Per constitution §17: heavy COUNT/aggregation should be cached or precomputed
  - Per constitution §31: long-term analytics belongs in OLAP (ClickHouse), not OLTP
  - For dashboard, 5-min cache is fine
  - For monthly reports, precompute daily_metrics table
  - Consider read replica for admin analytics queries
