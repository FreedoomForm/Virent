accessPattern: users.findByEmail
owner: modules/users
endpoint: POST /api/v1/auth/login/server/user (B0 — auth check)
endpoint: POST /api/v1/auth/login/server/admin (B0 — auth check)

priority: D0   # critical for login

params:
  email: text

select:
  - id
  - email
  - password_hash
  - role
  - status
  - phone_verified
  - balance_cents

filters:
  - email = :email
  - deleted_at IS NULL

index:
  name: idx_users_email
  columns:
    - email
  unique: true
  partial: WHERE deleted_at IS NULL

budget:
  p95Ms: 30
  maxRowsReturned: 1
  maxRowsScanned: 1
  maxPayloadKb: 1
  cacheTtlSec: 0    # never cache auth lookups

notes:
  - Called on every login attempt
  - Must be fast — index is UNIQUE so it's a single-row lookup
  - DO NOT cache — caching auth lookups creates security risks
  - Per constitution §15.2: never cache permission/auth checks without versioning
  - password_hash never returned in API DTO
