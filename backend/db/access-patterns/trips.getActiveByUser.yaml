accessPattern: trips.getActiveByUser
owner: modules/trips
endpoint: GET /api/v1/trips/active
view: GET /api/v1/views/trip-detail (B0 section)

priority: D0   # critical — needed for app home screen

params:
  userId: uuid (from JWT)

select:
  - id
  - status
  - start_time
  - reservation_expires
  - scooter_id
  - city_id
  - start_coordinates
  - start_battery
  - cost_so_far   # might be computed
  - duration_so_far

filters:
  - user_id = :userId
  - status IN ('reserved', 'active')

sort:
  - created_at DESC   # most recent first (only one expected, but sort stable)

index:
  name: idx_trips_user_status
  columns:
    - user_id
    - status

budget:
  p95Ms: 30
  maxRowsReturned: 1
  maxRowsScanned: 5
  maxPayloadKb: 5
  cacheTtlSec: 5    # very short cache — UX-critical but changes often

notes:
  - At most one active/reserved trip per user (enforced by app logic + can add UNIQUE constraint)
  - Called on every app launch — must be fast
  - Cache 5 seconds to avoid hammering on rapid screen switches
