accessPattern: scooters.findNearestAvailable
owner: modules/scooters
endpoint: GET /api/v1/discovery/nearest

priority: D1

params:
  latitude: float
  longitude: float
  radius_km: float (default 2, max 50)
  limit: int (default 10, max 50)

select:
  - id
  - name
  - model
  - battery
  - coordinates
  - distance_km    # computed via haversine

filters:
  - status = 'available'
  - battery >= 15
  - distance(latLng, coordinates) <= :radius_km

sort:
  - distance_km ASC

index:
  # PostGIS: GIST index on coordinates geography(POINT, 4326)
  # MongoDB: 2dsphere index on coordinates
  name: idx_scooters_coordinates_2dsphere
  type: geo

budget:
  p95Ms: 100
  maxRowsReturned: 50
  maxRowsScanned: 1000   # geo queries can scan more
  maxPayloadKb: 30
  cacheTtlSec: 10    # short cache — scooter availability changes

notes:
  - Per constitution §30: OLTP DB can do simple geo, but for advanced search use Elasticsearch
  - Real production should use PostGIS or MongoDB 2dsphere for $near queries
  - Current implementation scans all available scooters and filters in app — OK for <1000 scooters
  - For 10K+ scooters, must use proper geo index
